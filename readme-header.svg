<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 320" role="img" aria-labelledby="title desc">
    <title id="title">Dragon of North</title>
    <desc id="desc">Identity and Authentication Platform</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#0a0a12"/>
            <stop offset="50%" stop-color="#1a1040"/>
            <stop offset="100%" stop-color="#6B57FF"/>
        </linearGradient>
        <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
        </linearGradient>
    </defs>

    <rect width="1600" height="320" fill="url(#bg)"/>

    <path d="M0,235 C180,280 420,170 630,210 C860,255 1090,160 1320,195 C1460,216 1545,205 1600,192 L1600,320 L0,320 Z"
          fill="url(#wave)"/>

    <text x="800" y="138" text-anchor="middle"
          fill="#ffffff" font-size="74" font-weight="700"
          font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="1">
        DRAGON OF NORTH
    </text>

    <text x="800" y="186" text-anchor="middle"
          fill="#d8d6ff" font-size="24" font-weight="500"
          font-family="Inter, Segoe UI, Arial, sans-serif">
        Identity and Authentication Platform - built for production, not tutorials
    </text>
</svg>

